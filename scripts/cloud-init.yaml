#cloud-config
package_update: true
package_upgrade: true

packages:
  - wireguard
  - qrencode
  - iptables-persistent

write_files:
  - path: /etc/sysctl.d/99-wireguard.conf
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1

  - path: /etc/sysctl.d/99-vpn-tuning.conf
    content: |
      net.core.default_qdisc = fq
      net.ipv4.tcp_congestion_control = bbr
      net.core.rmem_max = 67108864
      net.core.wmem_max = 67108864
      net.ipv4.tcp_rmem = 4096 87380 67108864
      net.ipv4.tcp_wmem = 4096 65536 67108864
      net.core.netdev_max_backlog = 5000
      net.ipv4.tcp_fastopen = 3
      net.ipv4.tcp_mtu_probing = 1

  - path: /root/setup-wireguard.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      # Space-separated "name:ip-suffix" pairs. Edit to add/remove devices.
      DEVICES="ipad-pro:2 ipad-air:3 iphone:4 studio:5 macair:6 macpro:7"

      echo "Setting up WireGuard server..."
      mkdir -p /etc/wireguard
      cd /etc/wireguard

      wg genkey | tee server_private.key | wg pubkey > server_public.key
      chmod 600 server_private.key
      SERVER_PRIVATE_KEY=$(cat server_private.key)
      SERVER_PUBLIC_KEY=$(cat server_public.key)

      cat > /etc/wireguard/wg0.conf <<EOF
      [Interface]
      Address = 10.100.0.1/24
      ListenPort = 51820
      PrivateKey = ${SERVER_PRIVATE_KEY}
      PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE; iptables -t mangle -A FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu; iptables -t mangle -A FORWARD -i wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE; iptables -t mangle -D FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu; iptables -t mangle -D FORWARD -i wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

      EOF

      mkdir -p /root/wireguard-clients
      SERVER_PUBLIC_IP=$(curl -s ifconfig.me)

      for entry in $DEVICES; do
        NAME=$(echo "$entry" | cut -d: -f1)
        SUFFIX=$(echo "$entry" | cut -d: -f2)
        CLIENT_IP="10.100.0.${SUFFIX}"
        CLIENT_PRIVATE_KEY=$(wg genkey)
        CLIENT_PUBLIC_KEY=$(echo "$CLIENT_PRIVATE_KEY" | wg pubkey)

        cat >> /etc/wireguard/wg0.conf <<EOF

      [Peer]
      # ${NAME}
      PublicKey = ${CLIENT_PUBLIC_KEY}
      AllowedIPs = ${CLIENT_IP}/32
      EOF

        cat > "/root/wireguard-clients/${NAME}.conf" <<EOF
      [Interface]
      PrivateKey = ${CLIENT_PRIVATE_KEY}
      Address = ${CLIENT_IP}/32
      DNS = 1.1.1.1, 1.0.0.1
      MTU = 1380

      [Peer]
      PublicKey = ${SERVER_PUBLIC_KEY}
      Endpoint = ${SERVER_PUBLIC_IP}:51820
      AllowedIPs = 0.0.0.0/0, ::/0
      PersistentKeepalive = 25
      EOF
        chmod 600 "/root/wireguard-clients/${NAME}.conf"
        qrencode -t ansiutf8 < "/root/wireguard-clients/${NAME}.conf" > "/root/wireguard-clients/${NAME}.qr"
        echo "Created ${NAME} (IP ${CLIENT_IP})"
      done

      chmod 600 /etc/wireguard/wg0.conf

      systemctl enable wg-quick@wg0
      systemctl start wg-quick@wg0

      echo "WireGuard setup complete!"
      echo "Server Public Key: ${SERVER_PUBLIC_KEY}"
      echo "Server Public IP: ${SERVER_PUBLIC_IP}"
      ls -1 /root/wireguard-clients/*.conf

runcmd:
  - sysctl -p /etc/sysctl.d/99-wireguard.conf
  - sysctl -p /etc/sysctl.d/99-vpn-tuning.conf
  - /root/setup-wireguard.sh
  - netfilter-persistent save
  - echo "WireGuard installation completed at $(date)" > /root/wireguard-install.log
