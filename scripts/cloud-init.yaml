#cloud-config
package_update: true
package_upgrade: true

packages:
  - wireguard
  - qrencode

write_files:
  - path: /etc/sysctl.d/99-wireguard.conf
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1

  - path: /root/setup-wireguard.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      
      echo "Setting up WireGuard server..."
      
      # Create WireGuard directory
      mkdir -p /etc/wireguard
      cd /etc/wireguard
      
      # Generate server keys
      wg genkey | tee server_private.key | wg pubkey > server_public.key
      chmod 600 server_private.key
      
      # Get server keys
      SERVER_PRIVATE_KEY=$(cat server_private.key)
      SERVER_PUBLIC_KEY=$(cat server_public.key)
      
      # Create server config
      cat > /etc/wireguard/wg0.conf <<EOF
      [Interface]
      Address = 10.100.0.1/24
      ListenPort = 51820
      PrivateKey = ${SERVER_PRIVATE_KEY}
      PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
      
      EOF
      
      # Generate 5 client configs
      mkdir -p /root/wireguard-clients
      SERVER_PUBLIC_IP=$(curl -s ifconfig.me)
      
      for i in {1..5}; do
        CLIENT_PRIVATE_KEY=$(wg genkey)
        CLIENT_PUBLIC_KEY=$(echo $CLIENT_PRIVATE_KEY | wg pubkey)
        CLIENT_IP="10.100.0.$((i+1))/32"
        
        # Add peer to server config
        cat >> /etc/wireguard/wg0.conf <<EOF
      
      [Peer]
      # Client ${i}
      PublicKey = ${CLIENT_PUBLIC_KEY}
      AllowedIPs = ${CLIENT_IP}
      EOF
        
        # Create client config
        cat > /root/wireguard-clients/client${i}.conf <<EOF
      [Interface]
      PrivateKey = ${CLIENT_PRIVATE_KEY}
      Address = ${CLIENT_IP}
      DNS = 1.1.1.1, 1.0.0.1
      
      [Peer]
      PublicKey = ${SERVER_PUBLIC_KEY}
      Endpoint = ${SERVER_PUBLIC_IP}:51820
      AllowedIPs = 0.0.0.0/0, ::/0
      PersistentKeepalive = 25
      EOF
        
        # Generate QR code
        qrencode -t ansiutf8 < /root/wireguard-clients/client${i}.conf > /root/wireguard-clients/client${i}.qr
        
        echo "Client ${i} configuration created"
      done
      
      # Set permissions
      chmod 600 /etc/wireguard/wg0.conf
      chmod 600 /root/wireguard-clients/*.conf
      
      # Enable and start WireGuard
      systemctl enable wg-quick@wg0
      systemctl start wg-quick@wg0
      
      echo "WireGuard setup complete!"
      echo "Server Public Key: ${SERVER_PUBLIC_KEY}"
      echo "Server Public IP: ${SERVER_PUBLIC_IP}"
      echo "Client configs available in /root/wireguard-clients/"

runcmd:
  - sysctl -p /etc/sysctl.d/99-wireguard.conf
  - /root/setup-wireguard.sh
  - echo "WireGuard installation completed at $(date)" > /root/wireguard-install.log